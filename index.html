  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx?v=2026051206"></script>
    <script>
      // Aggressively unregister all service workers and clear caches
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(registrations => {
          for (const registration of registrations) {
            registration.unregister().then(() => {
              console.log('SW unregistered successfully');
              // Clear cache after unregistering
              if ('caches' in window) {
                caches.keys().then(names => {
                  for (const name of names) caches.delete(name);
                });
              }
            });
          }
        }).catch(err => console.error('SW unregistration failed:', err));
      }
      
      // Secondary check for caches
      if ('caches' in window) {
        caches.keys().then(names => {
          for (const name of names) caches.delete(name);
        });
      }
    </script>
  </body>
