<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Athena Chain</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#f3ba2f" />
    <link rel="apple-touch-icon" href="https://ik.imagekit.io/7e0zp2ext/GLD.png?updatedAt=1772483693392" />
    <meta name="4f7479e31f225d5c0b812cdd976a6e7a83f721ab" content="4f7479e31f225d5c0b812cdd976a6e7a83f721ab" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            // Check for updates on focus
            window.addEventListener('focus', () => {
              reg.update().catch(() => {});
            });

            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // New version available! Send message to skip waiting
                  newWorker.postMessage({ type: 'SKIP_WAITING' });
                }
              });
            });
          });
        });

        // Reload the page when the new service worker takes control
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });
      }
    </script>
  </body>
</html>
